<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Arquitectura conceptual del sistema AgroEscudo</title>
  <desc id="desc">Un silo con sondas de temperatura y sensor ambiental transmite lecturas por LoRa a un gateway conectado a internet, la API y la plataforma AgroEscudo para generar alertas, historial y reportes.</desc>
  <defs>
    <linearGradient id="siloMetal" x1="0" x2="1">
      <stop offset="0" stop-color="#dce3df"/>
      <stop offset="0.5" stop-color="#f8faf8"/>
      <stop offset="1" stop-color="#bdc9c3"/>
    </linearGradient>
    <linearGradient id="grain" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#f0c35d"/>
      <stop offset="1" stop-color="#c98218"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 10 5 0 10Z" fill="#0b6b50"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#071d18" flood-opacity=".12"/>
    </filter>
    <pattern id="grainDots" width="24" height="18" patternUnits="userSpaceOnUse">
      <ellipse cx="6" cy="6" rx="4" ry="2.4" fill="#f7d981" opacity=".68" transform="rotate(-12 6 6)"/>
      <ellipse cx="18" cy="13" rx="4" ry="2.4" fill="#b76d12" opacity=".35" transform="rotate(18 18 13)"/>
    </pattern>
  </defs>

  <rect width="1600" height="900" fill="#f7faf7"/>
  <path d="M0 86H1600M0 814H1600" stroke="#d9e4de" stroke-width="2"/>
  <text x="70" y="54" fill="#0b6b50" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800" letter-spacing="3">ARQUITECTURA AGROESCUDO</text>
  <text x="1530" y="54" text-anchor="end" fill="#62716a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Ilustración técnica conceptual</text>

  <!-- Silo seccionado -->
  <g filter="url(#softShadow)">
    <path d="M100 252 330 112 560 252Z" fill="url(#siloMetal)" stroke="#66766f" stroke-width="5"/>
    <path d="M132 250H528V720c0 50-89 79-198 79s-198-29-198-79Z" fill="url(#siloMetal)" stroke="#66766f" stroke-width="5"/>
    <path d="M154 426c89-33 263-33 352 0v293c0 32-78 57-176 57s-176-25-176-57Z" fill="url(#grain)"/>
    <path d="M154 426c89-33 263-33 352 0v293c0 32-78 57-176 57s-176-25-176-57Z" fill="url(#grainDots)" opacity=".8"/>
    <ellipse cx="330" cy="426" rx="176" ry="38" fill="#f3cc6e" stroke="#bd7819" stroke-width="3"/>
    <path d="M173 269V707M220 245V749M267 218V770M330 181V782M393 218V770M440 245V749M487 269V707" stroke="#83918b" stroke-width="2" opacity=".38"/>
  </g>
  <text x="330" y="846" text-anchor="middle" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">Silo + grano almacenado</text>

  <!-- Sondas internas -->
  <g stroke="#0b6b50" stroke-width="5" fill="#fff">
    <path d="M236 282V686"/>
    <path d="M330 246V718"/>
    <path d="M424 282V686"/>
    <circle cx="236" cy="474" r="11"/><circle cx="236" cy="570" r="11"/><circle cx="236" cy="660" r="11"/>
    <circle cx="330" cy="456" r="11"/><circle cx="330" cy="556" r="11"/><circle cx="330" cy="676" r="11"/>
    <circle cx="424" cy="474" r="11"/><circle cx="424" cy="570" r="11"/><circle cx="424" cy="660" r="11"/>
  </g>
  <g fill="#d69a27">
    <circle cx="236" cy="474" r="5"/><circle cx="236" cy="570" r="5"/><circle cx="236" cy="660" r="5"/>
    <circle cx="330" cy="456" r="5"/><circle cx="330" cy="556" r="5"/><circle cx="330" cy="676" r="5"/>
    <circle cx="424" cy="474" r="5"/><circle cx="424" cy="570" r="5"/><circle cx="424" cy="660" r="5"/>
  </g>
  <rect x="178" y="316" width="304" height="54" rx="9" fill="#073e32"/>
  <text x="330" y="350" text-anchor="middle" fill="#fff" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="800">Sondas de temperatura interna</text>

  <!-- Nodo exterior -->
  <g transform="translate(521 312)" filter="url(#softShadow)">
    <rect width="128" height="150" rx="18" fill="#073e32" stroke="#f2c66d" stroke-width="4"/>
    <path d="M102 22V-24" stroke="#10231c" stroke-width="7" stroke-linecap="round"/>
    <circle cx="102" cy="-29" r="7" fill="#d69a27"/>
    <path d="M47 52h34M39 70h50" stroke="#f2c66d" stroke-width="6" stroke-linecap="round"/>
    <circle cx="64" cy="108" r="15" fill="#fff"/>
    <path d="M58 108h12M64 102v12" stroke="#0b6b50" stroke-width="4" stroke-linecap="round"/>
  </g>
  <text x="585" y="492" text-anchor="middle" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="20" font-weight="900">SiloSensor</text>
  <text x="585" y="519" text-anchor="middle" fill="#62716a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Ambiente · batería · estado</text>

  <!-- LoRa -->
  <path d="M658 374H735" stroke="#0b6b50" stroke-width="6" marker-end="url(#arrow)"/>
  <g fill="none" stroke="#d69a27" stroke-width="5" stroke-linecap="round">
    <path d="M668 331c25-25 66-25 91 0"/>
    <path d="M682 347c17-17 45-17 62 0"/>
  </g>
  <text x="708" y="294" text-anchor="middle" fill="#0b6b50" font-family="Inter,Arial,sans-serif" font-size="18" font-weight="900">LoRa local</text>

  <!-- Gateway -->
  <g transform="translate(755 300)" filter="url(#softShadow)">
    <rect width="180" height="170" rx="22" fill="#fff" stroke="#0b6b50" stroke-width="5"/>
    <path d="M90 48V15M67 60c13-13 33-13 46 0M53 45c21-21 54-21 75 0" fill="none" stroke="#d69a27" stroke-width="6" stroke-linecap="round"/>
    <rect x="48" y="82" width="84" height="50" rx="10" fill="#073e32"/>
    <circle cx="69" cy="107" r="5" fill="#6ee7b7"/>
    <path d="M84 107h27" stroke="#fff" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="845" y="504" text-anchor="middle" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">Gateway</text>
  <text x="845" y="532" text-anchor="middle" fill="#62716a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Almacena y sincroniza</text>

  <!-- Internet y API -->
  <path d="M945 385H1012" stroke="#0b6b50" stroke-width="6" marker-end="url(#arrow)"/>
  <g transform="translate(1033 288)" filter="url(#softShadow)">
    <path d="M47 150h152c37 0 58-24 58-53 0-27-19-48-44-52C201 17 175 0 144 0c-38 0-70 26-79 62-37 0-65 19-65 47 0 23 18 41 47 41Z" fill="#fff" stroke="#0b6b50" stroke-width="5"/>
    <circle cx="128" cy="78" r="35" fill="#073e32"/>
    <text x="128" y="86" text-anchor="middle" fill="#f2c66d" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">API</text>
  </g>
  <text x="1161" y="480" text-anchor="middle" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">Internet + API</text>
  <text x="1161" y="508" text-anchor="middle" fill="#62716a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Datos protegidos y disponibles</text>

  <!-- Plataforma -->
  <path d="M1301 385H1360" stroke="#0b6b50" stroke-width="6" marker-end="url(#arrow)"/>
  <g transform="translate(1375 214)" filter="url(#softShadow)">
    <rect width="170" height="126" rx="14" fill="#10231c" stroke="#0b6b50" stroke-width="5"/>
    <rect x="12" y="13" width="146" height="91" rx="7" fill="#eef2ee"/>
    <path d="M30 83 58 63 82 73 111 43 143 55" fill="none" stroke="#0b6b50" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M68 127h34v31H68zM45 158h80" stroke="#10231c" stroke-width="8"/>
    <rect x="-28" y="180" width="76" height="136" rx="16" fill="#10231c" stroke="#0b6b50" stroke-width="5"/>
    <rect x="-18" y="195" width="56" height="98" rx="7" fill="#eef2ee"/>
    <circle cx="10" cy="246" r="17" fill="#d69a27"/>
    <path d="M10 236v12l8 6" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round"/>
    <rect x="72" y="193" width="122" height="58" rx="12" fill="#f2c66d"/>
    <path d="M91 218h18l9 9 18-19 15 15 23-7" fill="none" stroke="#073e32" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="72" y="270" width="122" height="58" rx="12" fill="#dff2e9"/>
    <path d="M92 289h81M92 306h58" stroke="#0b6b50" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="1450" y="576" text-anchor="middle" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="22" font-weight="900">Dashboard + app</text>
  <text x="1450" y="604" text-anchor="middle" fill="#62716a" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">Alertas · historial · reportes</text>

  <!-- Leyenda -->
  <g transform="translate(720 690)">
    <rect width="760" height="98" rx="18" fill="#fff" stroke="#d9e4de" stroke-width="3"/>
    <text x="32" y="37" fill="#0b6b50" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="900" letter-spacing="2">VARIABLES Y ESTADO</text>
    <g transform="translate(32 62)" fill="#10231c" font-family="Inter,Arial,sans-serif" font-size="15" font-weight="700">
      <circle cx="7" cy="-5" r="7" fill="#d69a27"/><text x="23">Temperatura del grano</text>
      <circle cx="230" cy="-5" r="7" fill="#0b6b50"/><text x="246">Temperatura y humedad ambiental</text>
      <circle cx="525" cy="-5" r="7" fill="#6b7c74"/><text x="541">Batería y conexión</text>
    </g>
  </g>
</svg>
